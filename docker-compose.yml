version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: kvartplata-watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kvartplata_watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kvartplata_watcher']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: kvartplata-watcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kvartplata_watcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kvartplata_watcher']
      interval: 5s
      timeout: 5s
      retries: 10

  visual-browser:
    image: lscr.io/linuxserver/chromium:latest
    container_name: kvartplata-watcher-visual-browser
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - CHROME_CLI=https://xn--new--o5df.xn--80aaaf3bi1ahsd.xn--80asehdb/
    volumes:
      - ./data/browser-profile:/config
    ports:
      - '3002:3000'
    restart: unless-stopped

  app:
    build: .
    container_name: kvartplata-watcher-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # Database connection
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kvartplata_watcher?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/kvartplata_watcher?schema=public
      # Используем встроенный браузер с общим профилем
      BROWSER_WS_ENDPOINT: ""
      BROWSER_PROFILE_PATH: "/app/data/browser-profile/.config/chromium"
      IS_DOCKER: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
